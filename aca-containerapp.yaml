properties:
  configuration:
    ingress:
      external: true
      targetPort: 8000
  template:
    containers:
      - name: jxm-aca-actions-app
        image: jxmacareg.azurecr.io/gh-action/container-app:latest
        command:
          - uvicorn
        args:
          - app.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
